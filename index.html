<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Cleaner (Nordic)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Ta bort glömda prenumerationer</h1>
    <p>Se dina registrerade tjänster och klicka på "Avsluta" för att öppna avprenumerationssidan direkt.</p>

    <div id="auth-section">
      <h2>Logga in</h2>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Lösenord" required />
        <button type="submit">Logga in</button>
      </form>
      <button id="register-btn">Registrera nytt konto</button>
      <div id="auth-message"></div>
    </div>

    <div id="app-section" style="display: none;">
      <label for="filter">Filtrera:</label>
      <input id="filter" type="search" placeholder="Sök tjänst eller land" />

      <button id="scan-email">Skanna email</button>

      <section id="subscription-list"></section>

      <div id="empty-state" class="hidden">Inga tjänster matchar din sökning.</div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
